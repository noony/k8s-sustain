repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
    - id: gitleaks

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd internal/dashboard/ui/frontend && npx eslint src/'
        language: system
        files: ^internal/dashboard/ui/frontend/src/
        pass_filenames: false
      - id: frontend-format
        name: frontend format check
        entry: bash -c 'cd internal/dashboard/ui/frontend && npx prettier --check src/'
        language: system
        files: ^internal/dashboard/ui/frontend/src/
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd internal/dashboard/ui/frontend && npx vue-tsc --noEmit'
        language: system
        files: ^internal/dashboard/ui/frontend/src/
        pass_filenames: false
