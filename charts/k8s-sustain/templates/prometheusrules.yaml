{{/*
PrometheusRule for users running the Prometheus Operator externally.
Enable with: controller.serviceMonitor.enabled=true
When using the bundled prometheus subchart, recording rules are
embedded in prometheus.server.serverFiles instead.
*/}}
{{- if .Values.controller.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "k8s-sustain.fullname" . }}-percentiles
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
spec:
  groups:
    - name: k8s_sustain.workload_mapping
      interval: 1m
      rules:
        # Map pod → workload for direct owners (StatefulSet, DaemonSet, Job).
        - record: k8s_sustain:pod_workload
          expr: |
            max by (namespace, pod, owner_kind, owner_name) (
              kube_pod_owner{
                owner_kind=~"StatefulSet|DaemonSet|Job",
                owner_is_controller="true"
              }
            )
        # Map pod → Deployment by resolving ReplicaSet → Deployment.
        # Renames owner_name (RS name) → replicaset and clears conflicting labels
        # so group_left can inject owner_kind/owner_name from kube_replicaset_owner.
        # Both sides are deduplicated with max by() to handle multiple
        # kube-state-metrics instances producing duplicate series.
        - record: k8s_sustain:pod_workload
          expr: |
            max by (namespace, pod, owner_kind, owner_name) (
              label_replace(
                label_replace(
                  label_replace(
                    max by (namespace, pod, owner_kind, owner_name, owner_is_controller) (
                      kube_pod_owner{owner_kind="ReplicaSet", owner_is_controller="true"}
                    ),
                    "replicaset", "$1", "owner_name", "(.*)"
                  ),
                  "owner_kind", "", "owner_kind", ".*"
                ),
                "owner_name", "", "owner_name", ".*"
              )
              * on(namespace, replicaset) group_left(owner_kind, owner_name)
              max by (namespace, replicaset, owner_kind, owner_name) (
                kube_replicaset_owner{owner_kind="Deployment", owner_is_controller="true"}
              )
            )
        # Argo Rollouts: Pod → ReplicaSet → Rollout
        - record: k8s_sustain:pod_workload
          expr: |
            max by (namespace, pod, owner_kind, owner_name) (
              label_replace(
                label_replace(
                  label_replace(
                    max by (namespace, pod, owner_kind, owner_name, owner_is_controller) (
                      kube_pod_owner{owner_kind="ReplicaSet", owner_is_controller="true"}
                    ),
                    "replicaset", "$1", "owner_name", "(.*)"
                  ),
                  "owner_kind", "", "owner_kind", ".*"
                ),
                "owner_name", "", "owner_name", ".*"
              )
              * on(namespace, replicaset) group_left(owner_kind, owner_name)
              max by (namespace, replicaset, owner_kind, owner_name) (
                kube_replicaset_owner{owner_kind="Rollout", owner_is_controller="true"}
              )
            )
    - name: k8s_sustain.cpu_rates
      interval: 1m
      rules:
        # Per-container CPU usage rate.
        - record: k8s_sustain:container_cpu_usage:rate5m
          expr: |
            rate(container_cpu_usage_seconds_total{
              container!="",
              container!="POD",
              image!=""
            }[5m])
        # Per-container CPU rate WITH workload labels — used by the operator.
        - record: k8s_sustain:container_cpu_usage_by_workload:rate5m
          expr: |
            k8s_sustain:container_cpu_usage:rate5m
            * on(namespace, pod) group_left(owner_kind, owner_name)
            k8s_sustain:pod_workload
        # Per-pod CPU rate, enriched with workload labels.
        # Containers within the same pod are summed.
        - record: k8s_sustain:pod_cpu_usage:rate5m
          expr: |
            sum by (namespace, pod, owner_kind, owner_name) (
              k8s_sustain:container_cpu_usage:rate5m
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )
    - name: k8s_sustain.memory_rates
      interval: 1m
      rules:
        # Per-container memory working set (excludes reclaimable page cache).
        - record: k8s_sustain:container_memory_working_set:bytes
          expr: |
            container_memory_working_set_bytes{
              container!="",
              container!="POD",
              image!=""
            }
        # Per-container memory WITH workload labels — used by the operator.
        - record: k8s_sustain:container_memory_by_workload:bytes
          expr: |
            k8s_sustain:container_memory_working_set:bytes
            * on(namespace, pod) group_left(owner_kind, owner_name)
            k8s_sustain:pod_workload
        # Per-pod memory working set, enriched with workload labels.
        # Containers within the same pod are summed.
        - record: k8s_sustain:pod_memory_working_set:bytes
          expr: |
            sum by (namespace, pod, owner_kind, owner_name) (
              k8s_sustain:container_memory_working_set:bytes
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )
    - name: k8s_sustain.resource_requests
      interval: 1m
      rules:
        # Per-container CPU requests WITH workload labels — used by the dashboard.
        - record: k8s_sustain:container_cpu_requests_by_workload:cores
          expr: |
            max by (namespace, container, owner_kind, owner_name) (
              kube_pod_container_resource_requests{resource="cpu", container!="", container!="POD"}
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )
        # Per-container memory requests WITH workload labels — used by the dashboard.
        - record: k8s_sustain:container_memory_requests_by_workload:bytes
          expr: |
            max by (namespace, container, owner_kind, owner_name) (
              kube_pod_container_resource_requests{resource="memory", container!="", container!="POD"}
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )
        # Per-pod-container CPU request, enriched with workload labels.
        # Sums over this give cluster totals (one series per pod-container).
        - record: k8s_sustain:pod_container_cpu_request:cores
          expr: |
            kube_pod_container_resource_requests{resource="cpu", container!="", container!="POD"}
            * on(namespace, pod) group_left(owner_kind, owner_name)
            k8s_sustain:pod_workload
        # Per-pod-container memory request, enriched with workload labels.
        - record: k8s_sustain:pod_container_memory_request:bytes
          expr: |
            kube_pod_container_resource_requests{resource="memory", container!="", container!="POD"}
            * on(namespace, pod) group_left(owner_kind, owner_name)
            k8s_sustain:pod_workload

    - name: k8s_sustain.savings_aggregates
      interval: 1m
      rules:
        # Cluster-total CPU savings: sum over workloads of (template request - recommendation).
        # Uses k8s_sustain_workload_template_cpu_cores (the original pod-template request,
        # stable across webhook injection) so savings reflect the gap from the user's
        # original spec to the recommendation, not the injected pod's already-rightsized value.
        - record: k8s_sustain:cluster_cpu_savings_cores
          expr: |
            sum(
              k8s_sustain_workload_template_cpu_cores
              - on(namespace, owner_kind, owner_name, container, policy)
              k8s_sustain_recommended_cpu_cores
            )

        - record: k8s_sustain:cluster_memory_savings_bytes
          expr: |
            sum(
              k8s_sustain_workload_template_memory_bytes
              - on(namespace, owner_kind, owner_name, container, policy)
              k8s_sustain_recommended_memory_bytes
            )

        - record: k8s_sustain:cluster_cpu_savings_ratio
          expr: |
            k8s_sustain:cluster_cpu_savings_cores
            / on()
            sum(k8s_sustain_workload_template_cpu_cores)

        - record: k8s_sustain:cluster_memory_savings_ratio
          expr: |
            k8s_sustain:cluster_memory_savings_bytes
            / on()
            sum(k8s_sustain_workload_template_memory_bytes)

        # Per-policy savings: same delta, grouped by the policy label which both metrics carry.
        - record: k8s_sustain:policy_cpu_savings_cores
          labels:
            resource: cpu
          expr: |
            sum by (policy) (
              k8s_sustain_workload_template_cpu_cores
              - on(namespace, owner_kind, owner_name, container, policy)
              k8s_sustain_recommended_cpu_cores
            )

        - record: k8s_sustain:policy_memory_savings_bytes
          labels:
            resource: memory
          expr: |
            sum by (policy) (
              k8s_sustain_workload_template_memory_bytes
              - on(namespace, owner_kind, owner_name, container, policy)
              k8s_sustain_recommended_memory_bytes
            )

    - name: k8s_sustain.headroom
      interval: 1m
      rules:
        - record: k8s_sustain:cluster_cpu_headroom_breakdown
          expr: |
            label_replace(sum(k8s_sustain:pod_cpu_usage:rate5m), "segment", "used", "", "")
            or
            label_replace(
              sum(k8s_sustain:pod_container_cpu_request:cores) - sum(k8s_sustain:pod_cpu_usage:rate5m),
              "segment", "idle", "", ""
            )
            or
            label_replace(
              sum(kube_node_status_allocatable{resource="cpu"}) - sum(k8s_sustain:pod_container_cpu_request:cores),
              "segment", "free", "", ""
            )

        - record: k8s_sustain:cluster_memory_headroom_breakdown
          expr: |
            label_replace(sum(k8s_sustain:pod_memory_working_set:bytes), "segment", "used", "", "")
            or
            label_replace(
              sum(k8s_sustain:pod_container_memory_request:bytes) - sum(k8s_sustain:pod_memory_working_set:bytes),
              "segment", "idle", "", ""
            )
            or
            label_replace(
              sum(kube_node_status_allocatable{resource="memory"}) - sum(k8s_sustain:pod_container_memory_request:bytes),
              "segment", "free", "", ""
            )

    - name: k8s_sustain.workload_signals
      interval: 1m
      rules:
        # True peak memory observed per (namespace, pod, container) over 24h.
        # max_over_time on container_memory_working_set_bytes alone misses
        # sub-scrape spikes (a container can OOM in <1s after touching the
        # limit). The kernel's high-water mark (cgroup v1: max_usage_bytes,
        # cgroup v2: peak_working_set_bytes) survives across scrape gaps. As
        # a safety net, when a container OOM'd we floor at the cgroup limit —
        # working-set was at least the limit at that instant, even if cAdvisor
        # never sampled it.
        # Each candidate signal is tagged with a distinct `_src` label so they
        # all survive the `or`, then max-by drops `_src` to take the overall
        # high-water value.
        - record: k8s_sustain:container_peak_memory_24h:bytes
          expr: |
            max by (namespace, owner_kind, owner_name, container) (
              (
                label_replace(
                  max by (namespace, pod, container) (max_over_time(container_memory_max_usage_bytes{container!="", container!="POD", image!=""}[24h])),
                  "_src", "max_usage", "", ""
                )
                or
                label_replace(
                  max by (namespace, pod, container) (max_over_time(container_memory_peak_working_set_bytes{container!="", container!="POD", image!=""}[24h])),
                  "_src", "peak_ws", "", ""
                )
                or
                label_replace(
                  max by (namespace, pod, container) (max_over_time(container_memory_working_set_bytes{container!="", container!="POD", image!=""}[24h:1m])),
                  "_src", "working_set", "", ""
                )
                or
                label_replace(
                  max by (namespace, pod, container) (max_over_time(kube_pod_container_resource_limits{resource="memory", container!="", container!="POD"}[24h]))
                  * on(namespace, pod, container) group_left()
                  max by (namespace, pod, container) (kube_pod_container_status_last_terminated_reason{reason="OOMKilled", container!="", container!="POD"}),
                  "_src", "oom_limit", "", ""
                )
              )
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )

        - record: k8s_sustain:workload_oom_24h
          expr: |
            sum by (namespace, owner_kind, owner_name) (
              max by (namespace, pod, container) (
                increase(
                  kube_pod_container_status_restarts_total{container!="", container!="POD"}[24h]
                )
              )
              * on(namespace, pod, container) group_left()
              max by (namespace, pod, container) (
                kube_pod_container_status_last_terminated_reason{reason="OOMKilled", container!="", container!="POD"}
              )
              * on(namespace, pod) group_left(owner_kind, owner_name)
              k8s_sustain:pod_workload
            )

        - record: k8s_sustain:workload_drifted
          expr: |
            (
              max by (namespace, owner_kind, owner_name) (
                abs(1 - k8s_sustain_workload_drift_ratio)
              ) > 0.10
            ) * 1

    - name: k8s_sustain.workload_signal
      interval: 1m
      rules:
        # Total CPU usage across all replicas, per container, per workload.
        - record: k8s_sustain:workload_cpu_usage:cores
          expr: |
            sum by (namespace, owner_kind, owner_name, container) (
              k8s_sustain:container_cpu_usage_by_workload:rate5m
            )
        # Total memory working set across all replicas, per container, per workload.
        - record: k8s_sustain:workload_memory_usage:bytes
          expr: |
            sum by (namespace, owner_kind, owner_name, container) (
              k8s_sustain:container_memory_by_workload:bytes
            )
        # Replica count for a workload, derived from distinct pods reporting metrics.
        # Counted at workload level (not per-container) so multi-container pods
        # don't inflate the count.
        - record: k8s_sustain:workload_replicas:count
          expr: |
            count by (namespace, owner_kind, owner_name) (
              count by (namespace, owner_kind, owner_name, pod) (
                k8s_sustain:container_cpu_usage_by_workload:rate5m
              )
            )

{{- end }}
