apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-sustain.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
  {{- with .Values.controller.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controller.service.type }}
  selector:
    {{- include "k8s-sustain.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.controller.service.port }}
      targetPort: metrics
      protocol: TCP
