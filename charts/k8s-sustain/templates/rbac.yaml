apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-sustain.fullname" . }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
rules:
  # Policy CRD
  - apiGroups: [k8s.sustain.io]
    resources: [policies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [k8s.sustain.io]
    resources: [policies/status]
    verbs: [get, update, patch]
  - apiGroups: [k8s.sustain.io]
    resources: [policies/finalizers]
    verbs: [update]
  # Leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Workloads — apps (read-only; the webhook handles resource injection)
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
  # Workloads — Argo Rollouts (read-only)
  - apiGroups: [argoproj.io]
    resources: [rollouts]
    verbs: [get, list, watch]
  # Workloads — batch (webhook handles CronJob pods at creation time)
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  # Namespaces and Pods (in-place updates)
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods/resize]
    verbs: [patch]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  # HPA detection (read-only; autoscaler.Detect queries only)
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  # KEDA ScaledObjects (read-only; autoscaler.Detect queries only)
  - apiGroups: [keda.sh]
    resources: [scaledobjects]
    verbs: [get, list, watch]
  # Events
  - apiGroups: [""]
    resources: [events]
    verbs: [list, create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-sustain.fullname" . }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-sustain.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-sustain.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
