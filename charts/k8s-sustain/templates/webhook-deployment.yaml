{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-sustain.webhookName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.webhook.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-sustain.webhookSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-sustain.webhookSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "k8s-sustain.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: {{ include "k8s-sustain.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - webhook
            - --port={{ .Values.webhook.port }}
            - --prometheus-address={{ .Values.webhook.prometheusAddress }}
            - --zap-log-level={{ .Values.webhook.logLevel }}
            - --tls-cert-file=/tls/tls.crt
            - --tls-key-file=/tls/tls.key
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.webhook.tlsSecretName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
