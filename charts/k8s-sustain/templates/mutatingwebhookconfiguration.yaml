{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "k8s-sustain.fullname" . }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
  {{- if .Values.webhook.certManager.enabled }}
  annotations:
    # cert-manager injects the CA bundle automatically when this annotation is set.
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "k8s-sustain.webhookName" . }}
  {{- end }}
webhooks:
  - name: pods.k8s-sustain.io
    admissionReviewVersions: [v1]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: 5
    # Only fire on CREATE — Ongoing mode and in-place updates are handled by the controller.
    rules:
      - apiGroups: [""]
        apiVersions: [v1]
        resources: [pods]
        operations: [CREATE]
        scope: Namespaced
    clientConfig:
      service:
        name: {{ include "k8s-sustain.webhookName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: 443
      {{- if and (not .Values.webhook.certManager.enabled) .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    # Exclude the operator's own namespace and system namespaces to avoid loops.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
            - kube-system
            - kube-public
            {{- range .Values.webhook.excludedNamespaces }}
            - {{ . }}
            {{- end }}
{{- end }}

{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled }}
---
# cert-manager Certificate — issues a TLS cert for the webhook service.
# Requires cert-manager CRDs to be installed in the cluster.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "k8s-sustain.webhookName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-sustain.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.webhook.tlsSecretName }}
  dnsNames:
    - {{ include "k8s-sustain.webhookName" . }}
    - {{ include "k8s-sustain.webhookName" . }}.{{ .Release.Namespace }}
    - {{ include "k8s-sustain.webhookName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "k8s-sustain.webhookName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.webhook.certManager.issuerRef.name }}
    kind: {{ .Values.webhook.certManager.issuerRef.kind }}
{{- end }}
