replicaCount: 1

image:
  repository: ghcr.io/noony/k8s-sustain
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

manager:
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"
  leaderElect: true
  logLevel: info

serviceAccount:
  create: true
  name: ""
  # Annotations to add to the service account (e.g. for IRSA, Workload Identity).
  annotations: {}

service:
  # Expose the metrics endpoint.
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Install the CRD as part of the chart.
# Set to false if you manage CRDs separately.
installCRDs: true

# ServiceMonitor and PrometheusRule for the operator.
# Requires the Prometheus Operator CRDs (installed by kube-prometheus-stack).
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

# Admission webhook — intercepts Pod CREATE and injects resources for OnCreate policies.
webhook:
  enabled: true
  # Number of webhook server replicas. ≥2 recommended for production HA.
  replicaCount: 1
  port: 9443
  prometheusAddress: http://localhost:9090
  logLevel: info
  # failurePolicy controls what happens when the webhook is unreachable.
  # "Ignore" (default) lets pods through; "Fail" blocks them.
  failurePolicy: Ignore
  # Extra namespaces to exclude from webhook interception (in addition to the
  # release namespace and kube-system / kube-public which are always excluded).
  excludedNamespaces: []
  # Name of the Secret containing tls.crt and tls.key for the webhook server.
  # Created automatically by cert-manager when certManager.enabled=true.
  tlsSecretName: k8s-sustain-webhook-tls
  # caBundle is the base64-encoded CA certificate used by the API server to
  # verify the webhook TLS cert. Required when certManager.enabled=false.
  caBundle: ""
  certManager:
    # Set to true to create a cert-manager Certificate and inject the CA bundle
    # automatically via the cert-manager.io/inject-ca-from annotation.
    enabled: false
    issuerRef:
      name: selfsigned-issuer
      kind: ClusterIssuer
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# kube-prometheus-stack subchart — https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
# Recording rules are managed via the PrometheusRule CRD (see serviceMonitor.enabled above).
kube-prometheus-stack:
  enabled: true

  # Components we don't need.
  grafana:
    enabled: false
  alertmanager:
    enabled: false
  nodeExporter:
    enabled: false
  defaultRules:
    create: false

  # Kubernetes component scrapers we don't need.
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  coreDns:
    enabled: false
  kubeEtcd:
    enabled: false

  # Required: kubelet provides cAdvisor metrics, kube-state-metrics provides pod→workload mapping.
  kubelet:
    enabled: true
  kubeStateMetrics:
    enabled: true
  prometheusOperator:
    enabled: true

  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 20Gi
