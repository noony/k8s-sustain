image:
  repository: ghcr.io/noony/k8s-sustain
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# When true, both the controller and webhook compute recommendations but never
# patch workloads or mutate pods (dry-run mode).
recommendOnly: false

# Prometheus server URL, shared by all components (controller, webhook, dashboard).
# Leave empty to auto-detect the bundled prometheus subchart service.
# Override only when using an external Prometheus instance.
# Example: http://prometheus.monitoring.svc:9090
prometheusAddress: ""

controller:
  replicaCount: 1
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"
  leaderElect: true
  # Lease name for leader election. Override when running multiple operator
  # installs side-by-side in the same cluster.
  leaderElectionID: ""
  concurrencyLimit: 5
  logLevel: debug
  service:
    type: ClusterIP
    port: 8080
    # Extra annotations for the metrics Service. The chart already adds
    # prometheus.io/scrape, prometheus.io/port, and prometheus.io/path so the
    # bundled Prometheus subchart picks up the controller's metrics endpoint.
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  # ServiceMonitor for the controller metrics endpoint.
  # Only useful when running the Prometheus Operator (e.g. kube-prometheus-stack).
  # Not needed when using the bundled prometheus subchart.
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
  nodeSelector: {}
  tolerations: []
  affinity: {}

serviceAccount:
  create: true
  name: ""
  # Annotations to add to the service account (e.g. for IRSA, Workload Identity).
  annotations: {}

# Install the CRD as part of the chart.
# Set to false if you manage CRDs separately.
installCRDs: true

# Admission webhook — intercepts Pod CREATE and injects resources for OnCreate policies.
webhook:
  enabled: true
  # Number of webhook server replicas. ≥2 recommended for production HA.
  replicaCount: 1
  port: 9443
  logLevel: debug
  # failurePolicy controls what happens when the webhook is unreachable.
  # "Ignore" (default) lets pods through; "Fail" blocks them.
  failurePolicy: Ignore
  # Extra namespaces to exclude from webhook interception (in addition to the
  # release namespace and kube-system / kube-public which are always excluded).
  excludedNamespaces: []
  # Name of the Secret containing tls.crt and tls.key for the webhook server.
  # Created automatically by cert-manager when certManager.enabled=true.
  tlsSecretName: k8s-sustain-webhook-tls
  # caBundle is the base64-encoded CA certificate used by the API server to
  # verify the webhook TLS cert. Required when certManager.enabled=false.
  caBundle: ""
  certManager:
    # Set to true to create a cert-manager Certificate and inject the CA bundle
    # automatically via the cert-manager.io/inject-ca-from annotation.
    enabled: false
    # Create a self-signed Issuer in the release namespace.
    # Set to false if you want to use your own Issuer/ClusterIssuer (configure issuerRef below).
    createIssuer: true
    issuerRef:
      # Only used when createIssuer is false.
      name: ""
      kind: Issuer
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Expose the dahboard service via ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: dashboard.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# -- Expose the dahboard service via gateway-api HTTPRoute
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - dashboard.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

# Dashboard — web UI for policy exploration, workload metrics, and simulation.
dashboard:
  enabled: false
  replicaCount: 1
  port: 8090
  bindAddress: ":8090"
  logLevel: debug
  # Allowed CORS origins. Use ["*"] to allow all origins (default).
  corsAllowedOrigins:
    - "*"
  service:
    type: ClusterIP
    port: 8090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# prometheus subchart — https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus
prometheus:
  enabled: true

  # Components we don't need.
  alertmanager:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false

  # Required: kube-state-metrics provides pod→workload mapping labels.
  kube-state-metrics:
    enabled: true

  server:
    retention: 15d
    persistentVolume:
      enabled: true
      size: 20Gi

  # Lock the bundled Prometheus down to a minimal, scoped scrape set so it
  # NEVER picks up arbitrary `prometheus.io/scrape: "true"` targets in other
  # namespaces. The chart's default scrapeConfigs that scrape cluster-wide
  # annotation-based targets are disabled by name; only the jobs we need stay
  # enabled or are added.
  scrapeConfigs:
    prometheus: { enabled: true }
    kubernetes-api-servers: { enabled: false }
    kubernetes-nodes: { enabled: false }
    # cAdvisor on each node — required for container CPU/mem metrics. Cluster
    # scope is intrinsic to cAdvisor (it sees all containers on its node).
    kubernetes-nodes-cadvisor: { enabled: true }
    # Disabled — these scrape ANY pod/service in ANY namespace that carries the
    # `prometheus.io/scrape: "true"` annotation.
    kubernetes-service-endpoints: { enabled: false }
    kubernetes-service-endpoints-slow: { enabled: false }
    kubernetes-services: { enabled: false }
    kubernetes-pods: { enabled: false }
    kubernetes-pods-slow: { enabled: false }
    prometheus-pushgateway: { enabled: false }

  # k8s-sustain components only — restricted to Prometheus's own namespace
  # and matched by app.kubernetes.io/name label (k8s-sustain, kube-state-metrics).
  extraScrapeConfigs: |
    - job_name: k8s-sustain
      # Required so the labels exported by kube-state-metrics (namespace, pod,
      # owner_*, etc.) survive scraping. Without this, Prometheus rewrites the
      # `namespace` and `pod` labels to the kube-state-metrics target's identity
      # and the kube_pod_* series collapse onto a single (namespace, pod) — which
      # makes pod_workload match every workload in the cluster.
      honor_labels: true
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            own_namespace: true
      relabel_configs:
        # Only the controller's metrics service and kube-state-metrics. The
        # webhook service shares the app.kubernetes.io/name label so we filter
        # by service name suffix instead.
        - action: keep
          source_labels: [__meta_kubernetes_service_name]
          regex: .*-metrics$|.*-kube-state-metrics$
        # Only scrape ports actually serving metrics — drops the controller's
        # healthz port and any non-metrics container port discovered alongside.
        - action: keep
          source_labels: [__meta_kubernetes_endpoint_port_name]
          regex: metrics|http
        - action: replace
          source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - action: replace
          source_labels: [__meta_kubernetes_service_name]
          target_label: service
        - action: replace
          source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
        - action: replace
          source_labels: [__meta_kubernetes_pod_name]
          target_label: pod

  serverFiles:
    recording_rules.yml:
      groups:
        - name: k8s_sustain.workload_mapping
          interval: 1m
          rules:
            # Map pod → workload for direct owners (StatefulSet, DaemonSet, Job).
            - record: k8s_sustain:pod_workload
              expr: |
                max by (namespace, pod, owner_kind, owner_name) (
                  kube_pod_owner{
                    owner_kind=~"StatefulSet|DaemonSet|Job",
                    owner_is_controller="true"
                  }
                )
            # Map pod → Deployment by resolving ReplicaSet → Deployment.
            # Renames owner_name (RS name) → replicaset and clears conflicting labels
            # so group_left can inject owner_kind/owner_name from kube_replicaset_owner.
            # Both sides are deduplicated with max by() to handle multiple
            # kube-state-metrics instances producing duplicate series.
            - record: k8s_sustain:pod_workload
              expr: |
                max by (namespace, pod, owner_kind, owner_name) (
                  label_replace(
                    label_replace(
                      label_replace(
                        max by (namespace, pod, owner_kind, owner_name, owner_is_controller) (
                          kube_pod_owner{owner_kind="ReplicaSet", owner_is_controller="true"}
                        ),
                        "replicaset", "$1", "owner_name", "(.*)"
                      ),
                      "owner_kind", "", "owner_kind", ".*"
                    ),
                    "owner_name", "", "owner_name", ".*"
                  )
                  * on(namespace, replicaset) group_left(owner_kind, owner_name)
                  max by (namespace, replicaset, owner_kind, owner_name) (
                    kube_replicaset_owner{owner_kind="Deployment", owner_is_controller="true"}
                  )
                )
            # Argo Rollouts: Pod → ReplicaSet → Rollout
            - record: k8s_sustain:pod_workload
              expr: |
                max by (namespace, pod, owner_kind, owner_name) (
                  label_replace(
                    label_replace(
                      label_replace(
                        max by (namespace, pod, owner_kind, owner_name, owner_is_controller) (
                          kube_pod_owner{owner_kind="ReplicaSet", owner_is_controller="true"}
                        ),
                        "replicaset", "$1", "owner_name", "(.*)"
                      ),
                      "owner_kind", "", "owner_kind", ".*"
                    ),
                    "owner_name", "", "owner_name", ".*"
                  )
                  * on(namespace, replicaset) group_left(owner_kind, owner_name)
                  max by (namespace, replicaset, owner_kind, owner_name) (
                    kube_replicaset_owner{owner_kind="Rollout", owner_is_controller="true"}
                  )
                )
        - name: k8s_sustain.cpu_rates
          interval: 1m
          rules:
            # Per-container CPU usage rate.
            - record: k8s_sustain:container_cpu_usage:rate5m
              expr: |
                rate(container_cpu_usage_seconds_total{
                  container!="",
                  container!="POD",
                  image!=""
                }[5m])
            # Per-container CPU rate WITH workload labels — used by the operator.
            - record: k8s_sustain:container_cpu_usage_by_workload:rate5m
              expr: |
                k8s_sustain:container_cpu_usage:rate5m
                * on(namespace, pod) group_left(owner_kind, owner_name)
                k8s_sustain:pod_workload
            # Per-pod CPU rate, enriched with workload labels.
            # Containers within the same pod are summed.
            - record: k8s_sustain:pod_cpu_usage:rate5m
              expr: |
                sum by (namespace, pod, owner_kind, owner_name) (
                  k8s_sustain:container_cpu_usage:rate5m
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )
        - name: k8s_sustain.memory_rates
          interval: 1m
          rules:
            # Per-container memory working set (excludes reclaimable page cache).
            - record: k8s_sustain:container_memory_working_set:bytes
              expr: |
                container_memory_working_set_bytes{
                  container!="",
                  container!="POD",
                  image!=""
                }
            # Per-container memory WITH workload labels — used by the operator.
            - record: k8s_sustain:container_memory_by_workload:bytes
              expr: |
                k8s_sustain:container_memory_working_set:bytes
                * on(namespace, pod) group_left(owner_kind, owner_name)
                k8s_sustain:pod_workload
            # Per-pod memory working set, enriched with workload labels.
            # Containers within the same pod are summed.
            - record: k8s_sustain:pod_memory_working_set:bytes
              expr: |
                sum by (namespace, pod, owner_kind, owner_name) (
                  k8s_sustain:container_memory_working_set:bytes
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )
        - name: k8s_sustain.resource_requests
          interval: 1m
          rules:
            # Per-container CPU requests WITH workload labels — used by the dashboard.
            - record: k8s_sustain:container_cpu_requests_by_workload:cores
              expr: |
                max by (namespace, container, owner_kind, owner_name) (
                  kube_pod_container_resource_requests{resource="cpu", container!="", container!="POD"}
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )
            # Per-container memory requests WITH workload labels — used by the dashboard.
            - record: k8s_sustain:container_memory_requests_by_workload:bytes
              expr: |
                max by (namespace, container, owner_kind, owner_name) (
                  kube_pod_container_resource_requests{resource="memory", container!="", container!="POD"}
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )
            # Per-pod-container CPU request, enriched with workload labels.
            # Sums over this give cluster totals (one series per pod-container).
            - record: k8s_sustain:pod_container_cpu_request:cores
              expr: |
                kube_pod_container_resource_requests{resource="cpu", container!="", container!="POD"}
                * on(namespace, pod) group_left(owner_kind, owner_name)
                k8s_sustain:pod_workload
            # Per-pod-container memory request, enriched with workload labels.
            - record: k8s_sustain:pod_container_memory_request:bytes
              expr: |
                kube_pod_container_resource_requests{resource="memory", container!="", container!="POD"}
                * on(namespace, pod) group_left(owner_kind, owner_name)
                k8s_sustain:pod_workload

        - name: k8s_sustain.savings_aggregates
          interval: 1m
          rules:
            # Cluster-total CPU savings: sum over workloads of (template request - recommendation).
            # Uses k8s_sustain_workload_template_cpu_cores (the original pod-template request,
            # stable across webhook injection) so savings reflect the gap from the user's
            # original spec to the recommendation, not the injected pod's already-rightsized value.
            - record: k8s_sustain:cluster_cpu_savings_cores
              expr: |
                sum(
                  k8s_sustain_workload_template_cpu_cores
                  - on(namespace, owner_kind, owner_name, container, policy)
                  k8s_sustain_recommended_cpu_cores
                )

            - record: k8s_sustain:cluster_memory_savings_bytes
              expr: |
                sum(
                  k8s_sustain_workload_template_memory_bytes
                  - on(namespace, owner_kind, owner_name, container, policy)
                  k8s_sustain_recommended_memory_bytes
                )

            - record: k8s_sustain:cluster_cpu_savings_ratio
              expr: |
                k8s_sustain:cluster_cpu_savings_cores
                / on()
                sum(k8s_sustain_workload_template_cpu_cores)

            - record: k8s_sustain:cluster_memory_savings_ratio
              expr: |
                k8s_sustain:cluster_memory_savings_bytes
                / on()
                sum(k8s_sustain_workload_template_memory_bytes)

            # Per-policy savings: same delta, grouped by the policy label which both metrics carry.
            - record: k8s_sustain:policy_cpu_savings_cores
              labels:
                resource: cpu
              expr: |
                sum by (policy) (
                  k8s_sustain_workload_template_cpu_cores
                  - on(namespace, owner_kind, owner_name, container, policy)
                  k8s_sustain_recommended_cpu_cores
                )

            - record: k8s_sustain:policy_memory_savings_bytes
              labels:
                resource: memory
              expr: |
                sum by (policy) (
                  k8s_sustain_workload_template_memory_bytes
                  - on(namespace, owner_kind, owner_name, container, policy)
                  k8s_sustain_recommended_memory_bytes
                )

        - name: k8s_sustain.headroom
          interval: 1m
          rules:
            - record: k8s_sustain:cluster_cpu_headroom_breakdown
              expr: |
                label_replace(sum(k8s_sustain:pod_cpu_usage:rate5m), "segment", "used", "", "")
                or
                label_replace(
                  sum(k8s_sustain:pod_container_cpu_request:cores) - sum(k8s_sustain:pod_cpu_usage:rate5m),
                  "segment", "idle", "", ""
                )
                or
                label_replace(
                  sum(kube_node_status_allocatable{resource="cpu"}) - sum(k8s_sustain:pod_container_cpu_request:cores),
                  "segment", "free", "", ""
                )

            - record: k8s_sustain:cluster_memory_headroom_breakdown
              expr: |
                label_replace(sum(k8s_sustain:pod_memory_working_set:bytes), "segment", "used", "", "")
                or
                label_replace(
                  sum(k8s_sustain:pod_container_memory_request:bytes) - sum(k8s_sustain:pod_memory_working_set:bytes),
                  "segment", "idle", "", ""
                )
                or
                label_replace(
                  sum(kube_node_status_allocatable{resource="memory"}) - sum(k8s_sustain:pod_container_memory_request:bytes),
                  "segment", "free", "", ""
                )

        - name: k8s_sustain.workload_signals
          interval: 1m
          rules:
            # True peak memory observed per (namespace, pod, container) over 24h.
            # max_over_time on container_memory_working_set_bytes alone misses
            # sub-scrape spikes (a container can OOM in <1s after touching the
            # limit). The kernel's high-water mark (cgroup v1: max_usage_bytes,
            # cgroup v2: peak_working_set_bytes) survives across scrape gaps. As
            # a safety net, when a container OOM'd we floor at the cgroup limit —
            # working-set was at least the limit at that instant, even if cAdvisor
            # never sampled it.
            # Each candidate signal is tagged with a distinct `_src` label so they
            # all survive the `or`, then max-by drops `_src` to take the overall
            # high-water value.
            - record: k8s_sustain:container_peak_memory_24h:bytes
              expr: |
                max by (namespace, owner_kind, owner_name, container) (
                  (
                    label_replace(
                      max by (namespace, pod, container) (max_over_time(container_memory_max_usage_bytes{container!="", container!="POD", image!=""}[24h])),
                      "_src", "max_usage", "", ""
                    )
                    or
                    label_replace(
                      max by (namespace, pod, container) (max_over_time(container_memory_peak_working_set_bytes{container!="", container!="POD", image!=""}[24h])),
                      "_src", "peak_ws", "", ""
                    )
                    or
                    label_replace(
                      max by (namespace, pod, container) (max_over_time(container_memory_working_set_bytes{container!="", container!="POD", image!=""}[24h:1m])),
                      "_src", "working_set", "", ""
                    )
                    or
                    label_replace(
                      max by (namespace, pod, container) (max_over_time(kube_pod_container_resource_limits{resource="memory", container!="", container!="POD"}[24h]))
                      * on(namespace, pod, container) group_left()
                      max by (namespace, pod, container) (kube_pod_container_status_last_terminated_reason{reason="OOMKilled", container!="", container!="POD"}),
                      "_src", "oom_limit", "", ""
                    )
                  )
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )

            - record: k8s_sustain:workload_oom_24h
              expr: |
                sum by (namespace, owner_kind, owner_name) (
                  max by (namespace, pod, container) (
                    increase(
                      kube_pod_container_status_restarts_total{container!="", container!="POD"}[24h]
                    )
                  )
                  * on(namespace, pod, container) group_left()
                  max by (namespace, pod, container) (
                    kube_pod_container_status_last_terminated_reason{reason="OOMKilled", container!="", container!="POD"}
                  )
                  * on(namespace, pod) group_left(owner_kind, owner_name)
                  k8s_sustain:pod_workload
                )

            - record: k8s_sustain:workload_drifted
              expr: |
                (
                  max by (namespace, owner_kind, owner_name) (
                    abs(1 - k8s_sustain_workload_drift_ratio)
                  ) > 0.10
                ) * 1

        - name: k8s_sustain.workload_signal
          interval: 1m
          rules:
            # Total CPU usage across all replicas, per container, per workload.
            - record: k8s_sustain:workload_cpu_usage:cores
              expr: |
                sum by (namespace, owner_kind, owner_name, container) (
                  k8s_sustain:container_cpu_usage_by_workload:rate5m
                )
            # Total memory working set across all replicas, per container, per workload.
            - record: k8s_sustain:workload_memory_usage:bytes
              expr: |
                sum by (namespace, owner_kind, owner_name, container) (
                  k8s_sustain:container_memory_by_workload:bytes
                )
            # Replica count for a workload, derived from distinct pods reporting metrics.
            # Counted at workload level (not per-container) so multi-container pods
            # don't inflate the count.
            - record: k8s_sustain:workload_replicas:count
              expr: |
                count by (namespace, owner_kind, owner_name) (
                  count by (namespace, owner_kind, owner_name, pod) (
                    k8s_sustain:container_cpu_usage_by_workload:rate5m
                  )
                )
