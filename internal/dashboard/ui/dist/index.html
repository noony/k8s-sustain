<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>k8s-sustain Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-hover: #22263a;
  --border: #2a2e3f;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --radius: 12px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-header {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-header h1 {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-header h1 .logo {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: #fff;
}
.sidebar-header .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}
.nav-section {
  padding: 8px 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  font-size: 14px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--bg-hover);
  color: var(--accent-light);
  border-left-color: var(--accent);
  font-weight: 500;
}
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.main { flex: 1; padding: 32px; max-width: 1200px; }
.main-wide { max-width: 100%; }

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-header h2 { font-size: 16px; font-weight: 600; }
.card-header h3 { font-size: 14px; font-weight: 600; }

/* Page header */
.page-header {
  margin-bottom: 28px;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}
.page-header p {
  color: var(--text-dim);
  font-size: 14px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.breadcrumb span { color: var(--text-dim); }

/* Table */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
thead th {
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
thead th.sort-header {
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th.sort-header:hover { color: var(--text); }
tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
tbody tr { cursor: pointer; transition: background 0.15s; }
tbody tr:hover { background: var(--bg-hover); }
tbody tr:last-child td { border-bottom: none; }

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.badge-green { background: rgba(34,197,94,.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
.badge-blue { background: rgba(59,130,246,.15); color: var(--blue); }
.badge-dim { background: rgba(139,143,163,.12); color: var(--text-dim); }
.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Kind badge */
.kind-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.kind-Deployment { background: rgba(99,102,241,.15); color: var(--accent-light); }
.kind-StatefulSet { background: rgba(6,182,212,.15); color: var(--cyan); }
.kind-DaemonSet { background: rgba(234,179,8,.15); color: var(--yellow); }
.kind-CronJob { background: rgba(59,130,246,.15); color: var(--blue); }

/* Charts */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.chart-container {
  position: relative;
  height: 320px;
}

/* Simulator form */
.sim-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.sim-section h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider-row input[type=range] {
  flex: 1;
  accent-color: var(--accent);
  height: 6px;
}
.slider-row .slider-value {
  min-width: 48px;
  text-align: right;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent-light);
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: var(--font);
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary {
  background: var(--bg-hover);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }

/* Recommendation result cards */
.rec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-top: 20px;
}
.rec-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.rec-card h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent-light);
}
.rec-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 13px;
}
.rec-row .label { color: var(--text-dim); }
.rec-row .value {
  font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.stat-card .stat-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}
.stat-card .stat-value {
  font-size: 28px;
  font-weight: 700;
  margin-top: 4px;
}
.stat-card .stat-detail {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Workload selector */
.workload-selector {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.workload-selector .form-group { margin-bottom: 0; flex: 1; min-width: 180px; }

/* Loading & empty */
.loading {
  text-align: center;
  padding: 48px;
  color: var(--text-dim);
}
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center;
  padding: 48px;
  color: var(--text-dim);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
  font-size: 13px;
  color: var(--text-dim);
}
.pagination button {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
}
.pagination button:hover:not(:disabled) { background: var(--bg-hover); }
.pagination button:disabled { opacity: 0.4; cursor: default; }

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-bar select, .filter-bar input[type=text] {
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
}
.filter-bar input[type=text] { min-width: 200px; }
.filter-bar input[type=text]:focus { outline: none; border-color: var(--accent); }

/* Container detail cards */
.container-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.container-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.container-card h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent-light);
}
.resource-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 13px;
}
.resource-row .label { color: var(--text-dim); }
.resource-row .current {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-weight: 500;
}
.resource-row .recommended {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-weight: 600;
  color: var(--green);
}

/* Resource diff */
.resource-diff {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
}
.resource-diff .old { color: var(--text-dim); text-decoration: line-through; }
.resource-diff .arrow { color: var(--text-dim); font-size: 11px; }
.resource-diff .new { font-weight: 600; }
.resource-diff .new.saving { color: var(--green); }
.resource-diff .new.increase { color: var(--red); }
.resource-diff .new.neutral { color: var(--text); }

/* Delta badge (no dot) */
.delta-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.delta-badge.saving { background: rgba(34,197,94,.15); color: var(--green); }
.delta-badge.increase { background: rgba(239,68,68,.15); color: var(--red); }
.delta-badge.neutral { background: rgba(139,143,163,.12); color: var(--text-dim); }

/* Savings value coloring */
.savings-positive { color: var(--green); }
.savings-negative { color: var(--red); }

/* OOM event legend */
.oom-legend {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--red);
  margin-left: 12px;
}
.oom-legend .oom-marker {
  width: 10px;
  height: 10px;
  background: var(--red);
  border-radius: 50%;
  display: inline-block;
}

/* Auto-refresh toggle */
.auto-refresh {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.auto-refresh input { accent-color: var(--accent); }

/* Time range selector */
.time-range-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.time-range-group {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.time-range-group button {
  background: transparent;
  color: var(--text-dim);
  border: none;
  padding: 5px 12px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  border-right: 1px solid var(--border);
}
.time-range-group button:last-child { border-right: none; }
.time-range-group button:hover { background: var(--bg-hover); color: var(--text); }
.time-range-group button.active {
  background: var(--accent);
  color: #fff;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .chart-grid, .sim-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">S</span> k8s-sustain</h1>
      <div class="subtitle">Resource Right-Sizing Dashboard</div>
    </div>
    <div class="nav-section">Overview</div>
    <div class="nav-item" data-page="overview" onclick="navigate('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
      Overview
    </div>
    <div class="nav-item" data-page="policies" onclick="navigate('policies')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Policies
    </div>
    <div class="nav-item" data-page="workloads" onclick="navigate('workloads')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Workloads
    </div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="simulator" onclick="navigate('simulator')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
      Simulator
    </div>
  </nav>
  <main class="main" id="content">
  </main>
</div>

<script>
const API = '';
let currentPage = 'overview';
let policyCache = [];
let chartInstances = {};
let autoRefreshTimer = null;
let lastSimulationData = null;
let lastSimulationBody = null;
let sortStates = {};
let dataCache = {};
let allWorkloadsState = { namespace: '', kind: '', automated: '', search: '', page: 1 };
let searchTimer = null;
let policyDetailState = {};
let workloadMetricsParams = null;

// ---- Time range selector ----
var timeRangeOptions = [
  { label: '1h',  window: '1h',   step: '1m'  },
  { label: '4h',  window: '4h',   step: '1m'  },
  { label: '12h', window: '12h',  step: '5m'  },
  { label: '1d',  window: '24h',  step: '5m'  },
  { label: '3d',  window: '72h',  step: '5m'  },
  { label: '7d',  window: '168h', step: '15m' },
  { label: '30d', window: '720h', step: '1h'  },
];
var defaultTimeRange = '168h';

function buildTimeRangeSelector(selectedWindow, onChangeFn) {
  return '<div class="time-range-group">' +
    timeRangeOptions.map(function(opt) {
      return '<button' + (opt.window === selectedWindow ? ' class="active"' : '') +
        ' onclick="' + onChangeFn + '(\'' + opt.window + '\')">' + opt.label + '</button>';
    }).join('') + '</div>';
}

function getTimeRangeStep(window) {
  for (var i = 0; i < timeRangeOptions.length; i++) {
    if (timeRangeOptions[i].window === window) return timeRangeOptions[i].step;
  }
  return '5m';
}

// ---- Auto-refresh ----
function stopAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}
function startAutoRefresh(fn, intervalMs) {
  stopAutoRefresh();
  autoRefreshTimer = setInterval(fn, intervalMs || 30000);
}
function autoRefreshToggle(checkbox, fn) {
  if (checkbox.checked) startAutoRefresh(fn, 30000);
  else stopAutoRefresh();
}

// ---- Hash-based routing ----
function buildHash(page, params) {
  switch (page) {
    case 'overview': return '/overview';
    case 'policies': return '/policies';
    case 'policy-detail': return '/policies/' + encodeURIComponent(params.name);
    case 'workloads': return '/workloads';
    case 'workload-detail': return '/workloads/' + encodeURIComponent(params.namespace) + '/' + encodeURIComponent(params.kind) + '/' + encodeURIComponent(params.name);
    case 'simulator':
      if (params && params.prefill) return '/simulator/' + encodeURIComponent(params.prefill.namespace) + '/' + encodeURIComponent(params.prefill.kind) + '/' + encodeURIComponent(params.prefill.name);
      return '/simulator';
    default: return '/overview';
  }
}

function parseHash() {
  const hash = (window.location.hash || '#/overview').slice(1);
  const parts = hash.split('/').filter(Boolean).map(decodeURIComponent);
  if (parts.length === 0 || parts[0] === 'overview') return { page: 'overview' };
  if (parts[0] === 'policies') {
    if (parts.length === 1) return { page: 'policies' };
    return { page: 'policy-detail', params: { name: parts[1] } };
  }
  if (parts[0] === 'workloads') {
    if (parts.length >= 4) return { page: 'workload-detail', params: { namespace: parts[1], kind: parts[2], name: parts[3] } };
    return { page: 'workloads' };
  }
  if (parts[0] === 'simulator') {
    if (parts.length >= 4) return { page: 'simulator', params: { prefill: { namespace: parts[1], kind: parts[2], name: parts[3] } } };
    return { page: 'simulator' };
  }
  return { page: 'overview' };
}

function navigate(page, params) {
  const hash = buildHash(page, params);
  if (window.location.hash === '#' + hash) {
    handleHashChange();
  } else {
    window.location.hash = hash;
  }
}

function handleHashChange() {
  const { page, params } = parseHash();
  stopAutoRefresh();
  currentPage = page;

  document.querySelectorAll('.nav-item').forEach(el => {
    const ep = el.dataset.page;
    const isActive = ep === page || (page === 'policy-detail' && ep === 'policies') || (page === 'workload-detail' && ep === 'workloads');
    el.classList.toggle('active', isActive);
  });

  const content = document.getElementById('content');
  content.className = 'main';

  switch (page) {
    case 'overview': renderOverview(); break;
    case 'policies': renderPolicies(); break;
    case 'policy-detail': renderPolicyDetail(params.name); break;
    case 'workloads': renderAllWorkloads(); break;
    case 'workload-detail': renderWorkloadDetail(params); break;
    case 'simulator':
      content.className = 'main main-wide';
      renderSimulator(params && params.prefill);
      break;
    default: renderOverview();
  }
}

window.addEventListener('hashchange', handleHashChange);

// ---- API helpers ----
async function api(path, opts) {
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

// ---- Sort utilities ----
function applySorting(data, tableId) {
  const state = sortStates[tableId];
  if (!state || !state.key) return data;
  return [...data].sort((a, b) => {
    let va = a[state.key], vb = b[state.key];
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string' && typeof vb === 'string') return state.dir * va.localeCompare(vb);
    return state.dir * ((parseFloat(va) || 0) - (parseFloat(vb) || 0));
  });
}

function sortArrow(tableId, key) {
  const state = sortStates[tableId];
  if (!state || state.key !== key) return '';
  return state.dir === 1 ? ' &#9650;' : ' &#9660;';
}

function doSort(tableId, key, rerenderFn) {
  const state = sortStates[tableId] || {};
  state.dir = state.key === key ? (state.dir || 1) * -1 : 1;
  state.key = key;
  sortStates[tableId] = state;
  rerenderFn();
}

// ---- Delta display ----
function deltaBadge(pct) {
  if (pct == null || isNaN(pct) || pct === 0) return '';
  const cls = pct < -5 ? 'saving' : pct > 5 ? 'increase' : 'neutral';
  const arrow = pct < 0 ? '&#8595;' : '&#8593;';
  return '<span class="delta-badge ' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span>';
}

function renderResourceDiff(current, recommended, resourceType) {
  if (!recommended) return '<span style="color:var(--text-dim)">-</span>';
  if (!current) return '<span class="recommended">' + recommended + '</span>';
  const parser = resourceType === 'cpu' ? parseCPUQuantity : parseMemoryQuantity;
  const curVal = parser(current);
  const recVal = parser(recommended);
  let delta = null;
  if (!isNaN(curVal) && !isNaN(recVal) && curVal > 0) {
    delta = Math.round((recVal - curVal) / curVal * 1000) / 10;
  }
  const cls = delta != null ? (delta < -5 ? 'saving' : delta > 5 ? 'increase' : 'neutral') : 'neutral';
  return '<span class="resource-diff"><span class="old">' + current + '</span> <span class="arrow">&rarr;</span> <span class="new ' + cls + '">' + recommended + '</span></span> ' + (delta != null ? deltaBadge(delta) : '');
}

// ---- Workload Detail ----
function changeWorkloadDetailTimeRange(window) {
  var p = workloadDetailParams;
  if (p) renderWorkloadDetail({namespace: p.namespace, kind: p.kind, name: p.name, policy: p.policy, window: window});
}
var workloadDetailParams = null;

async function renderWorkloadDetail(params) {
  var namespace = params.namespace, kind = params.kind, name = params.name, policy = params.policy || '';
  var window = params.window || defaultTimeRange;
  var step = getTimeRangeStep(window);
  workloadDetailParams = {namespace: namespace, kind: kind, name: name, policy: policy, window: window};
  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading workload...</div>';
  destroyCharts();

  try {
    var results = await Promise.all([
      api('/api/workloads/' + namespace + '/' + kind + '/' + name + '/metrics?window=' + window + '&step=' + step),
      api('/api/workloads/' + namespace + '/' + kind + '/' + name + '/recommendations'),
    ]);
    var metrics = results[0], recs = results[1];

    var containers = new Set([].concat(Object.keys(metrics.cpu || {}), Object.keys(metrics.memory || {})));
    var policyName = recs.policyName || policy || '';
    var recContainers = recs.containers || {};
    var resources = metrics.resources || {};
    var cpuRequests = metrics.cpuRequests || {};
    var memoryRequests = metrics.memoryRequests || {};
    var oomByContainer = groupOOMEventsByContainer(metrics.oomEvents);

    content.innerHTML =
      '<div class="breadcrumb"><a href="#" onclick="event.preventDefault();navigate(\'workloads\')">Workloads</a><span>/</span><span>' + name + '</span></div>' +
      '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">' +
        '<div><h1><span class="kind-badge kind-' + kind + '" style="font-size:14px;margin-right:4px">' + kind + '</span> ' + name + '</h1>' +
        '<p>' + namespace + ' &mdash; ' + containers.size + ' container(s) &mdash; ' +
          (recs.automated
            ? '<span class="badge badge-green">Automated</span> <a href="#" onclick="event.preventDefault();navigate(\'policy-detail\',{name:\'' + policyName + '\'})">' + policyName + '</a>'
            : '<span class="badge badge-dim">Manual</span>') +
        '</p></div>' +
        '<div class="time-range-bar">' +
          buildTimeRangeSelector(window, 'changeWorkloadDetailTimeRange') +
          '<label class="auto-refresh"><input type="checkbox" onchange="autoRefreshToggle(this, function(){ renderWorkloadDetail({namespace:\'' + namespace + '\',kind:\'' + kind + '\',name:\'' + name + '\',policy:\'' + policyName + '\',window:\'' + window + '\'}) })"> Auto-refresh (30s)</label>' +
        '</div>' +
      '</div>' +

      (recs.automated && Object.keys(recContainers).length > 0 ?
      '<div class="card"><div class="card-header"><h2>Recommendations</h2></div>' +
        '<div class="container-grid">' +
        Object.entries(recContainers).map(function(entry) {
          var cname = entry[0], rec = entry[1];
          var res = resources[cname] || {};
          return '<div class="container-card"><h4>' + cname + '</h4>' +
            '<div class="resource-row"><span class="label">CPU Request</span>' + renderResourceDiff(res.cpuRequest, rec.cpuRequest, 'cpu') + '</div>' +
            '<div class="resource-row"><span class="label">Memory Request</span>' + renderResourceDiff(res.memoryRequest, rec.memoryRequest, 'memory') + '</div>' +
          '</div>';
        }).join('') +
        '</div></div>' : '') +

      Array.from(containers).map(function(cname) {
        var oomCount = (oomByContainer[cname] || []).length;
        var oomBadge = oomCount > 0 ? ' <span class="oom-legend"><span class="oom-marker"></span>' + oomCount + ' OOM kill' + (oomCount > 1 ? 's' : '') + '</span>' : '';
        return '<div class="card"><div class="card-header"><h2>Container: <code>' + cname + '</code></h2></div>' +
          '<div class="chart-grid"><div>' +
            '<h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">CPU Usage (cores)</h3>' +
            '<div class="chart-container"><canvas id="cpu-' + cname + '"></canvas></div>' +
          '</div><div>' +
            '<h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">Memory Usage (MiB)' + oomBadge + '</h3>' +
            '<div class="chart-container"><canvas id="mem-' + cname + '"></canvas></div>' +
          '</div></div></div>';
      }).join('') +
      (containers.size === 0 ? '<div class="card"><div class="empty-state"><p>No metrics data available.</p></div></div>' : '') +
      '<div style="margin-top:16px">' +
        '<button class="btn btn-secondary" onclick="navigate(\'simulator\',{prefill:{namespace:\'' + namespace + '\',kind:\'' + kind + '\',name:\'' + name + '\'}})">' +
          '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>' +
          ' Open in Simulator</button></div>';

    // Render charts
    containers.forEach(function(cname) {
      var rec = recContainers[cname] || {};
      var res = resources[cname] || {};
      if (metrics.cpu && metrics.cpu[cname]) {
        var cpuAnnotations = [];
        var cpuExtra = [];
        if (cpuRequests[cname] && cpuRequests[cname].length) {
          cpuExtra.push({ data: cpuRequests[cname], label: 'Request', color: '#f59e0b', dash: [4, 4] });
        } else if (res.cpuRequest) {
          cpuAnnotations.push({ value: parseCPUQuantity(res.cpuRequest), label: 'Request: ' + res.cpuRequest, color: '#f59e0b', dash: [4, 4] });
        }
        if (res.cpuLimit) cpuAnnotations.push({ value: parseCPUQuantity(res.cpuLimit), label: 'Limit: ' + res.cpuLimit, color: '#f97316', dash: [2, 2] });
        createTimeSeriesChart('cpu-' + cname, metrics.cpu[cname], {
          label: 'CPU Usage', color: '#6366f1', unit: 'cores',
          yFormat: function(v) { return v.toFixed(3); },
          annotationValue: recs.automated ? parseCPUQuantity(rec.cpuRequest) : null,
          annotationLabel: rec.cpuRequest ? 'Recommendation: ' + rec.cpuRequest : undefined,
          annotations: cpuAnnotations,
          extraSeries: cpuExtra,
        });
      }
      if (metrics.memory && metrics.memory[cname]) {
        var memAnnotations = [];
        var memExtra = [];
        if (memoryRequests[cname] && memoryRequests[cname].length) {
          memExtra.push({ data: memoryRequests[cname], label: 'Request', color: '#f59e0b', dash: [4, 4] });
        } else if (res.memoryRequest) {
          memAnnotations.push({ value: parseMemoryQuantity(res.memoryRequest), label: 'Request: ' + res.memoryRequest, color: '#f59e0b', dash: [4, 4] });
        }
        if (res.memoryLimit) memAnnotations.push({ value: parseMemoryQuantity(res.memoryLimit), label: 'Limit: ' + res.memoryLimit, color: '#f97316', dash: [2, 2] });
        createTimeSeriesChart('mem-' + cname, metrics.memory[cname], {
          label: 'Memory Usage', color: '#06b6d4', unit: 'MiB',
          transform: function(v) { return v / (1024 * 1024); },
          yFormat: function(v) { return v.toFixed(0); },
          annotationValue: recs.automated ? parseMemoryQuantity(rec.memoryRequest) : null,
          annotationLabel: rec.memoryRequest ? 'Recommendation: ' + rec.memoryRequest : undefined,
          annotations: memAnnotations,
          extraSeries: memExtra,
          oomEvents: oomByContainer[cname] || [],
        });
      }
    });
  } catch (err) {
    content.innerHTML = '<div class="card"><p style="color:var(--red)">Error: ' + err.message + '</p></div>';
  }
}

// ---- Simulator ----
function buildSimWindowSelector(selectedWindow) {
  return '<div class="time-range-group">' +
    timeRangeOptions.map(function(opt) {
      return '<button type="button"' + (opt.window === selectedWindow ? ' class="active"' : '') +
        ' onclick="selectSimWindow(this,\'' + opt.window + '\')">' + opt.label + '</button>';
    }).join('') + '</div>' +
    '<input type="hidden" id="sim-window" value="' + selectedWindow + '">';
}
function selectSimWindow(btn, window) {
  document.getElementById('sim-window').value = window;
  var btns = btn.parentElement.querySelectorAll('button');
  btns.forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

async function runSimulation() {
  var resultsDiv = document.getElementById('sim-results');
  resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Running simulation...</div>';
  destroyCharts();

  var ns = document.getElementById('sim-ns').value;
  var ownerName = document.getElementById('sim-name').value;
  if (!ns) { resultsDiv.innerHTML = '<div class="card"><p style="color:var(--red)">Namespace is required.</p></div>'; return; }
  if (!ownerName) { resultsDiv.innerHTML = '<div class="card"><p style="color:var(--red)">Workload name is required.</p></div>'; return; }

  var cpuPct = parseInt(document.getElementById('sim-cpu-pct').value);
  var cpuHr = parseInt(document.getElementById('sim-cpu-hr').value);
  var memPct = parseInt(document.getElementById('sim-mem-pct').value);
  var memHr = parseInt(document.getElementById('sim-mem-hr').value);

  var body = {
    namespace: ns, ownerKind: document.getElementById('sim-kind').value, ownerName: ownerName,
    window: document.getElementById('sim-window').value, step: getTimeRangeStep(document.getElementById('sim-window').value),
    cpu: { percentile: cpuPct, headroom: cpuHr },
    memory: { percentile: memPct, headroom: memHr }
  };

  var cpuMin = document.getElementById('sim-cpu-min').value;
  var cpuMax = document.getElementById('sim-cpu-max').value;
  var memMin = document.getElementById('sim-mem-min').value;
  var memMax = document.getElementById('sim-mem-max').value;
  if (cpuMin) body.cpu.minAllowed = cpuMin;
  if (cpuMax) body.cpu.maxAllowed = cpuMax;
  if (memMin) body.memory.minAllowed = memMin;
  if (memMax) body.memory.maxAllowed = memMax;

  try {
    var data = await api('/api/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    lastSimulationData = data;
    lastSimulationBody = body;

    var containers = Object.keys(data.containers || {});
    if (containers.length === 0) {
      resultsDiv.innerHTML = '<div class="card"><div class="empty-state"><p>No metrics data found for this workload. Make sure the namespace, kind, and name are correct.</p></div></div>';
      return;
    }

    resultsDiv.innerHTML =
      '<div class="card"><div class="card-header"><h2>Simulation Results</h2>' +
        '<div style="display:flex;gap:8px">' +
          '<button class="btn btn-secondary" onclick="exportYAML()" title="Download as YAML patch"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> YAML</button>' +
          '<button class="btn btn-secondary" onclick="exportCSV()" title="Download as CSV"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> CSV</button>' +
        '</div></div>' +
        '<div class="rec-grid">' +
        containers.map(function(c) {
          var rec = data.containers[c];
          var res = (data.resources || {})[c] || {};
          return '<div class="rec-card"><h4>' + c + '</h4>' +
            '<div class="rec-row"><span class="label">CPU Request</span>' + renderResourceDiff(res.cpuRequest, rec.cpuRequest, 'cpu') + '</div>' +
            '<div class="rec-row"><span class="label">Memory Request</span>' + renderResourceDiff(res.memoryRequest, rec.memoryRequest, 'memory') + '</div>' +
          '</div>';
        }).join('') +
        '</div></div>' +
      containers.map(function(cname) {
        return '<div class="card"><div class="card-header"><h2>Container: <code>' + cname + '</code></h2></div>' +
          '<div class="chart-grid"><div>' +
            '<h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">CPU Usage + Recommendation</h3>' +
            '<div class="chart-container"><canvas id="simcpu-' + cname + '"></canvas></div>' +
          '</div><div>' +
            '<h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">Memory Usage + Recommendation</h3>' +
            '<div class="chart-container"><canvas id="simmem-' + cname + '"></canvas></div>' +
          '</div></div></div>';
      }).join('');

    var simResources = data.resources || {};
    var simCpuReq = data.cpuRequests || {};
    var simMemReq = data.memoryRequests || {};
    containers.forEach(function(cname) {
      var rec = data.containers[cname];
      var res = simResources[cname] || {};
      if (data.cpuSeries && data.cpuSeries[cname]) {
        var cpuAnnotations = [];
        var cpuExtra = [];
        if (simCpuReq[cname] && simCpuReq[cname].length) {
          cpuExtra.push({ data: simCpuReq[cname], label: 'Request', color: '#f59e0b', dash: [4, 4] });
        } else if (res.cpuRequest) {
          cpuAnnotations.push({ value: parseCPUQuantity(res.cpuRequest), label: 'Request: ' + res.cpuRequest, color: '#f59e0b', dash: [4, 4] });
        }
        if (res.cpuLimit) cpuAnnotations.push({ value: parseCPUQuantity(res.cpuLimit), label: 'Limit: ' + res.cpuLimit, color: '#f97316', dash: [2, 2] });
        createTimeSeriesChart('simcpu-' + cname, data.cpuSeries[cname], {
          label: 'CPU Usage', color: '#6366f1', unit: 'cores',
          yFormat: function(v) { return v.toFixed(3); },
          annotationValue: parseCPUQuantity(rec.cpuRequest),
          annotationLabel: 'Recommendation: ' + rec.cpuRequest,
          annotations: cpuAnnotations,
          extraSeries: cpuExtra,
        });
      }
      if (data.memorySeries && data.memorySeries[cname]) {
        var memAnnotations = [];
        var memExtra = [];
        if (simMemReq[cname] && simMemReq[cname].length) {
          memExtra.push({ data: simMemReq[cname], label: 'Request', color: '#f59e0b', dash: [4, 4] });
        } else if (res.memoryRequest) {
          memAnnotations.push({ value: parseMemoryQuantity(res.memoryRequest), label: 'Request: ' + res.memoryRequest, color: '#f59e0b', dash: [4, 4] });
        }
        if (res.memoryLimit) memAnnotations.push({ value: parseMemoryQuantity(res.memoryLimit), label: 'Limit: ' + res.memoryLimit, color: '#f97316', dash: [2, 2] });
        createTimeSeriesChart('simmem-' + cname, data.memorySeries[cname], {
          label: 'Memory Usage', color: '#06b6d4', unit: 'MiB',
          transform: function(v) { return v / (1024 * 1024); },
          yFormat: function(v) { return v.toFixed(0); },
          annotationValue: parseMemoryQuantity(rec.memoryRequest),
          annotationLabel: 'Recommendation: ' + rec.memoryRequest,
          annotations: memAnnotations,
          extraSeries: memExtra,
        });
      }
    });
  } catch (err) {
    resultsDiv.innerHTML = '<div class="card"><p style="color:var(--red)">Error: ' + err.message + '</p></div>';
  }
}

// ---- Export functions ----
function exportYAML() {
  if (!lastSimulationData || !lastSimulationBody) return;
  var b = lastSimulationBody;
  var containers = Object.entries(lastSimulationData.containers);
  var resourceLines = containers.map(function(entry) {
    var cname = entry[0], rec = entry[1];
    var parts = ['        - name: ' + cname + '\n          resources:\n            requests:'];
    if (rec.cpuRequest) parts.push('              cpu: "' + rec.cpuRequest + '"');
    if (rec.memoryRequest) parts.push('              memory: "' + rec.memoryRequest + '"');
    return parts.join('\n');
  }).join('\n');

  var yaml = '# k8s-sustain simulation recommendation\n' +
    '# Workload: ' + b.namespace + '/' + b.ownerKind + '/' + b.ownerName + '\n' +
    '# Window: ' + b.window + ' | CPU P' + b.cpu.percentile + '+' + b.cpu.headroom + '% | Mem P' + b.memory.percentile + '+' + b.memory.headroom + '%\n' +
    'apiVersion: apps/v1\nkind: ' + b.ownerKind + '\nmetadata:\n  name: ' + b.ownerName + '\n  namespace: ' + b.namespace + '\n' +
    'spec:\n  template:\n    spec:\n      containers:\n' + resourceLines + '\n';
  downloadFile(b.ownerName + '-recommendations.yaml', yaml, 'text/yaml');
}

function exportCSV() {
  if (!lastSimulationData || !lastSimulationBody) return;
  var b = lastSimulationBody;
  var rows = [['Container', 'CPU Request', 'Memory Request']];
  for (var entry of Object.entries(lastSimulationData.containers)) {
    rows.push([entry[0], entry[1].cpuRequest || '', entry[1].memoryRequest || '']);
  }
  var csv = rows.map(function(r) { return r.join(','); }).join('\n');
  downloadFile(b.ownerName + '-recommendations.csv', csv, 'text/csv');
}

function downloadFile(filename, content, mimeType) {
  var blob = new Blob([content], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---- Chart helpers ----

// Chart.js plugin: draws vertical lines + skull markers for OOM kill events
var oomEventPlugin = {
  id: 'oomEvents',
  afterDraw: function(chart) {
    var events = chart.options.plugins.oomEvents;
    if (!events || events.length === 0) return;
    var ctx = chart.ctx;
    var xScale = chart.scales.x;
    var yScale = chart.scales.y;
    var top = yScale.top;
    var bottom = yScale.bottom;

    events.forEach(function(ev) {
      var x = xScale.getPixelForValue(ev.x);
      if (x < xScale.left || x > xScale.right) return;

      // Vertical dashed line
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
      ctx.lineWidth = 1;
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.stroke();
      ctx.setLineDash([]);

      // Red circle marker at top
      ctx.beginPath();
      ctx.arc(x, top + 10, 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#ef4444';
      ctx.fill();
      ctx.strokeStyle = '#1a1d27';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // "x" inside the circle
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2715', x, top + 10);
      ctx.restore();
    });
  }
};

Chart.register(oomEventPlugin);

function createTimeSeriesChart(canvasId, points, opts) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;

  var transform = opts.transform || function(v) { return v; };
  var chartData = points.map(function(p) { return { x: new Date(p.timestamp), y: transform(p.value) }; });

  var datasets = [{
    label: opts.label, data: chartData,
    borderColor: opts.color, backgroundColor: opts.color + '18',
    fill: true, borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, tension: 0.3,
  }];

  // Extra time-series (e.g. historical requests/limits from Prometheus)
  (opts.extraSeries || []).forEach(function(s) {
    if (!s.data || !s.data.length) return;
    var seriesData = s.data.map(function(p) { return { x: new Date(p.timestamp), y: transform(p.value) }; });
    datasets.push({
      label: s.label, data: seriesData,
      borderColor: s.color || '#f59e0b', borderWidth: 1.5,
      borderDash: s.dash || [4, 4], pointRadius: 0, fill: false,
      stepped: 'before',
    });
  });

  var annotations = (opts.annotations || []).slice();
  if (opts.annotationValue != null && !isNaN(opts.annotationValue)) {
    annotations.unshift({ value: opts.annotationValue, label: opts.annotationLabel || 'Recommendation', color: '#ef4444', dash: [8, 4] });
  }
  annotations.forEach(function(anno) {
    if (anno.value == null || isNaN(anno.value)) return;
    var val = opts.transform ? opts.transform(anno.value) : anno.value;
    datasets.push({
      label: anno.label,
      data: chartData.map(function(p) { return { x: p.x, y: val }; }),
      borderColor: anno.color || '#ef4444', borderWidth: 1.5,
      borderDash: anno.dash || [8, 4], pointRadius: 0, fill: false,
    });
  });

  // Prepare OOM event markers (array of {x: Date} for the plugin)
  var oomMarkers = (opts.oomEvents || []).map(function(ev) {
    return { x: new Date(ev.timestamp), pod: ev.pod || '' };
  });

  chartInstances[canvasId] = new Chart(canvas, {
    type: 'line',
    data: { datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: datasets.length > 1,
          labels: { color: '#8b8fa3', font: { size: 11 } }
        },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2a2e3f', borderWidth: 1,
          titleColor: '#e4e6ed', bodyColor: '#e4e6ed',
          callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + opts.yFormat(ctx.parsed.y) + ' ' + opts.unit; } }
        },
        oomEvents: oomMarkers
      },
      scales: {
        x: { type: 'time', grid: { color: '#2a2e3f' }, ticks: { color: '#8b8fa3', font: { size: 11 }, maxTicksLimit: 8 } },
        y: { grid: { color: '#2a2e3f' }, ticks: { color: '#8b8fa3', font: { size: 11 }, callback: function(v) { return opts.yFormat(v); } }, beginAtZero: true }
      }
    }
  });
}

// ---- OOM event helpers ----
function groupOOMEventsByContainer(events) {
  var byContainer = {};
  if (!events || !events.length) return byContainer;
  events.forEach(function(ev) {
    if (!byContainer[ev.container]) byContainer[ev.container] = [];
    byContainer[ev.container].push(ev);
  });
  return byContainer;
}

// ---- Helpers ----
function statusBadge(conditions) {
  if (!conditions || conditions.length === 0) return '<span class="badge badge-dim">Unknown</span>';
  var ready = conditions.find(function(c) { return c.type === 'Ready'; });
  if (!ready) return '<span class="badge badge-dim">Unknown</span>';
  if (ready.status === 'True') return '<span class="badge badge-green">Ready</span>';
  return '<span class="badge badge-red">' + (ready.reason || 'Not Ready') + '</span>';
}

function updateTypeBadges(update) {
  if (!update) return '';
  var types = [];
  if (update.deployment) types.push('<span class="kind-badge kind-Deployment">Deploy:' + update.deployment + '</span>');
  if (update.statefulSet) types.push('<span class="kind-badge kind-StatefulSet">STS:' + update.statefulSet + '</span>');
  if (update.daemonSet) types.push('<span class="kind-badge kind-DaemonSet">DS:' + update.daemonSet + '</span>');
  if (update.cronJob) types.push('<span class="kind-badge kind-CronJob">CJ:' + update.cronJob + '</span>');
  return types.join(' ') || '<span style="color:var(--text-dim)">-</span>';
}

function timeAgo(dateStr) {
  if (!dateStr) return '-';
  var d = new Date(dateStr);
  var diff = Date.now() - d.getTime();
  var hours = Math.floor(diff / 3600000);
  if (hours < 1) return 'just now';
  if (hours < 24) return hours + 'h ago';
  var days = Math.floor(hours / 24);
  if (days < 30) return days + 'd ago';
  return d.toLocaleDateString();
}

function parseCPUQuantity(str) {
  if (!str) return NaN;
  if (str.endsWith('m')) return parseInt(str) / 1000;
  return parseFloat(str);
}

function parseMemoryQuantity(str) {
  if (!str) return NaN;
  var units = { Ki: 1024, Mi: Math.pow(1024, 2), Gi: Math.pow(1024, 3), Ti: Math.pow(1024, 4) };
  for (var suffix in units) {
    if (str.endsWith(suffix)) return parseInt(str) * units[suffix];
  }
  return parseFloat(str);
}

handleHashChange();
