# scenario: underprovisioned
# expected: CPU request grows from 50m to ~330m, memory request from 32Mi to
# ~230Mi within ~WINDOW + reconcile_interval. Demonstrates upsizing.
#
# Note: this scenario deliberately omits limits so the container can actually
# consume more than its current request.

apiVersion: v1
kind: Namespace
metadata:
  name: scenario-underprovisioned
  labels:
    k8s-sustain.io/scenario: underprovisioned
---
apiVersion: k8s.sustain.io/v1alpha1
kind: Policy
metadata:
  name: scenario-underprovisioned
spec:
  selector:
    namespaces: [scenario-underprovisioned]
  rightSizing:
    update:
      types:
        deployment: Ongoing
    resourcesConfigs:
      cpu:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 10
        limits:
          noLimit: true
      memory:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 15
        limits:
          requestsLimitsRatio: 1.5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen
  namespace: scenario-underprovisioned
data:
  loadgen.py: |
    import os, time
    duty = float(os.environ.get('LOAD_DUTY', '0.2'))
    mem_mb = int(os.environ.get('LOAD_MEM_MB', '50'))
    phases = os.environ.get('LOAD_PHASES', '').strip()
    buf = bytearray(mem_mb * 1024 * 1024)
    for i in range(0, len(buf), 4096):
        buf[i] = 1
    def burn(d, deadline):
        period = 0.1
        on = period * d
        off = period - on
        while time.monotonic() < deadline:
            s = time.monotonic()
            while time.monotonic() - s < on:
                pass
            if off > 0:
                time.sleep(off)
    if phases:
        schedule = [(float(p.split(':')[0]), float(p.split(':')[1])) for p in phases.split(',')]
        while True:
            for d, secs in schedule:
                burn(d, time.monotonic() + secs)
    else:
        burn(duty, float('inf'))
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress
  namespace: scenario-underprovisioned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress
  template:
    metadata:
      labels:
        app: stress
      annotations:
        k8s.sustain.io/policy: scenario-underprovisioned
    spec:
      containers:
      - name: stress
        image: python:3.12-alpine
        command: ["python3", "/loadgen/loadgen.py"]
        env:
          - name: LOAD_DUTY
            value: "0.30"   # ~300m of one core, well above the 50m request
          - name: LOAD_MEM_MB
            value: "200"
        volumeMounts:
          - name: loadgen
            mountPath: /loadgen
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          # limits intentionally omitted so the container can actually exceed
          # requests; once the recommender upsizes, the policy's
          # memory.limits.requestsLimitsRatio: 1.5 takes over.
      volumes:
        - name: loadgen
          configMap:
            name: loadgen
