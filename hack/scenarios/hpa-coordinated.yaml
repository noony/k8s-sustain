# scenario: hpa-coordinated
# With autoscalerCoordination.enabled: true, the CPU request is sized at
# base * (110/60) ≈ 1.83×. Steady load 150m / coordinated request ~302m ≈ 50%
# utilization — below the 60% HPA target — so replicas stay at 1.
# Validates the overhead formula.

apiVersion: v1
kind: Namespace
metadata:
  name: scenario-hpa-coordinated
  labels:
    k8s-sustain.io/scenario: hpa-coordinated
---
apiVersion: k8s.sustain.io/v1alpha1
kind: Policy
metadata:
  name: scenario-hpa-coordinated
spec:
  selector:
    namespaces: [scenario-hpa-coordinated]
  rightSizing:
    update:
      types:
        deployment: Ongoing
    autoscalerCoordination:
      enabled: true
    resourcesConfigs:
      cpu:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 10
        limits:
          noLimit: true
      memory:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 15
        limits:
          requestsLimitsRatio: 1.5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen
  namespace: scenario-hpa-coordinated
data:
  loadgen.py: |
    import os, time
    duty = float(os.environ.get('LOAD_DUTY', '0.2'))
    mem_mb = int(os.environ.get('LOAD_MEM_MB', '50'))
    phases = os.environ.get('LOAD_PHASES', '').strip()
    buf = bytearray(mem_mb * 1024 * 1024)
    for i in range(0, len(buf), 4096):
        buf[i] = 1
    def burn(d, deadline):
        period = 0.1
        on = period * d
        off = period - on
        while time.monotonic() < deadline:
            s = time.monotonic()
            while time.monotonic() - s < on:
                pass
            if off > 0:
                time.sleep(off)
    if phases:
        schedule = [(float(p.split(':')[0]), float(p.split(':')[1])) for p in phases.split(',')]
        while True:
            for d, secs in schedule:
                burn(d, time.monotonic() + secs)
    else:
        burn(duty, float('inf'))
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress
  namespace: scenario-hpa-coordinated
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress
  template:
    metadata:
      labels:
        app: stress
      annotations:
        k8s.sustain.io/policy: scenario-hpa-coordinated
    spec:
      containers:
      - name: stress
        image: python:3.12-alpine
        command: ["python3", "/loadgen/loadgen.py"]
        env:
          - name: LOAD_DUTY
            value: "0.15"   # ~150m of one core
          - name: LOAD_MEM_MB
            value: "64"
        volumeMounts:
          - name: loadgen
            mountPath: /loadgen
        resources:
          requests:
            cpu: 500m
            memory: 128Mi
          limits:
            memory: 128Mi
      volumes:
        - name: loadgen
          configMap:
            name: loadgen
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stress
  namespace: scenario-hpa-coordinated
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stress
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
