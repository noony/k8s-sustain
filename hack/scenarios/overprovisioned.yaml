# scenario: overprovisioned
# expected: CPU request drops from 1000m to ~60m and memory request from 512Mi
# to ~50Mi within ~WINDOW + reconcile_interval. Demonstrates aggressive downsizing.

apiVersion: v1
kind: Namespace
metadata:
  name: scenario-overprovisioned
  labels:
    k8s-sustain.io/scenario: overprovisioned
---
apiVersion: k8s.sustain.io/v1alpha1
kind: Policy
metadata:
  name: scenario-overprovisioned
spec:
  selector:
    namespaces: [scenario-overprovisioned]
  rightSizing:
    update:
      types:
        deployment: Ongoing
    resourcesConfigs:
      cpu:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 10
        limits:
          noLimit: true
      memory:
        window: __WINDOW__
        requests:
          percentile: 95
          headroom: 15
        limits:
          requestsLimitsRatio: 1.5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen
  namespace: scenario-overprovisioned
data:
  loadgen.py: |
    import os, time
    duty = float(os.environ.get('LOAD_DUTY', '0.2'))
    mem_mb = int(os.environ.get('LOAD_MEM_MB', '50'))
    phases = os.environ.get('LOAD_PHASES', '').strip()
    buf = bytearray(mem_mb * 1024 * 1024)
    for i in range(0, len(buf), 4096):
        buf[i] = 1
    def burn(d, deadline):
        period = 0.1
        on = period * d
        off = period - on
        while time.monotonic() < deadline:
            s = time.monotonic()
            while time.monotonic() - s < on:
                pass
            if off > 0:
                time.sleep(off)
    if phases:
        schedule = [(float(p.split(':')[0]), float(p.split(':')[1])) for p in phases.split(',')]
        while True:
            for d, secs in schedule:
                burn(d, time.monotonic() + secs)
    else:
        burn(duty, float('inf'))
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress
  namespace: scenario-overprovisioned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress
  template:
    metadata:
      labels:
        app: stress
      annotations:
        k8s.sustain.io/policy: scenario-overprovisioned
    spec:
      containers:
      - name: stress
        image: python:3.12-alpine
        command: ["python3", "/loadgen/loadgen.py"]
        env:
          - name: LOAD_DUTY
            value: "0.05"   # ~50m of one core
          - name: LOAD_MEM_MB
            value: "40"
        volumeMounts:
          - name: loadgen
            mountPath: /loadgen
        resources:
          requests:
            cpu: 1000m
            memory: 512Mi
          limits:
            memory: 512Mi
      volumes:
        - name: loadgen
          configMap:
            name: loadgen
